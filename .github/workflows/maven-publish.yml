name: Build with Maven

on:
  push: # Запускается при каждом пуше в любую ветку
    branches: [ "main" ] # Можно изменить на нужную ветку, например, "master"
  pull_request: # Запускается при создании или обновлении Pull Request
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Используем виртуальную машину с Ubuntu

    steps:
    - uses: actions/checkout@v4 # Шаг 1: Загрузить код из репозитория

    - name: Set up JDK 21 # Шаг 2: Установить Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Кэшируем зависимости Maven для ускорения

    - name: Build with Maven # Шаг 3: Выполнить команду Maven
      run: mvn -B package --file pom.xml # -B = Batch mode (меньше логов), package = цель сборки

    - name: Upload JAR artifact # Шаг 4: Загрузить JAR-файл как артефакт
      uses: actions/upload-artifact@v4
      with:
        name: CustomMeteorites-JAR # Имя артефакта
        path: target/*.jar # Путь к JAR-файлу после сборки
