name: Create Release and Upload JAR

on:
  push:
    tags:
      - 'v*' # Запускается при пуше тега, начинающегося с 'v' (например, v1.0.0, v2.1.3)

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Get JAR file name
      id: get_jar
      run: |
        JAR_FILE=$(find target -name "*.jar" -type f | head -n 1)
        echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
        echo "Found JAR: $JAR_FILE"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Этот токен автоматически доступен
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false # true, если хотите создать черновик
        prerelease: false # true, если это предварительный релиз

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ env.JAR_FILE }}
        asset_name: CustomMeteorites.jar # Имя файла в релизе
        asset_content_type: application/java-archive
