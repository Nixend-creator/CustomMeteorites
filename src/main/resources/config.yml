# --- Настройки плагина CustomMeteorites ---

# Включить/выключать случайное падение метеоритов.
enable-random-meteorites: true
# Интервал между случайными метеоритами (в секундах).
random-meteorite-interval: 10800
# Название мира, в котором будут падать метеориты.
random-meteorite-world: world
# Укажите координаты региона (X и Z), в пределах которого могут падать метеориты.
random-meteorite-max-spawn-x-coord: 2500
random-meteorite-max-spawn-z-coord: 2500
random-meteorite-min-spawn-x-coord: -2500
random-meteorite-min-spawn-z-coord: -2500
# Высота (координата Y), на которой появляются метеориты.
# Рекомендуется не превышать 256. Метеориты исчезают, если появляются выше этого уровня.
random-meteorite-spawn-height: 150

# Защита зон WorldGuard. Требуются плагины WorldGuard и WorldEdit.
# Включите, чтобы метеориты не падали в "безопасные зоны" WorldGuard.
enable-worldguard-safe-zones: false
# Названия регионов WorldGuard, в которые метеориты не должны падать.
worldguard-safe-zone-names:
  - 'spawn'
  - 'MyHouse'
# Включите, чтобы защитить ВСЕ регионы WorldGuard.
protect-all-worldguard-zones: false
# Минимальное расстояние (в блоках) от границ безопасной зоны, на котором может появиться метеорит.
# Установите 0, чтобы отключить буфер.
worldguard-safe-zone-buffer: 100

# Защита зон GriefPrevention.
# Включите, чтобы метеориты не падали в заявленные территории игроков.
# (Интеграция с GriefPrevention не реализована в этом примере)
enable-griefprevention-safe-zones: false
griefprevention-safe-zone-buffer: 50

# --- Настройки метеоритов ---
meteorites:
  '1': # Огненный
    # Шанс появления по сравнению с другими метеоритами.
    chance: 10
    # Время (в секундах), через которое метеорит исчезает. 0 — оставлять навсегда.
    # Минимум 20 секунд, чтобы метеорит успел упасть!
    clean-up-meteorite-blocks-interval: 200
    # Скорость метеорита (0–5). Рекомендуется 2. (Это влияет на setVelocity)
    meteorite-speed: 2
    outer-layer-size: 4
    enable-inner-layer: true
    inner-layer-size: 3
    # Сообщение в чат при появлении метеорита. Оставьте пустым, чтобы отключить.
    chat-message: '&9[&6CustomMeteorites&9] &7Был замечен &4&lОгненный &9&lМетеорит &7около &3X:&f%x% &3Z:&f%z% &7!'
    # Команды, выполняемые при появлении метеорита (в консоли). Поддерживаются плейсхолдеры.
    meteorite-spawn-commands:
      - ''
    # Ядро метеорита (материал: вес)
    core-block:
      NETHERITE_BLOCK: 1
      ANCIENT_DEBRIS: 2
    inner-layer-blocks:
      DIAMOND_ORE: 5
      GOLD_ORE: 10
      NETHER_QUARTZ_ORE: 5
    outer-layer-blocks:
      MAGMA_BLOCK: 10
      NETHERRACK: 10
      OBSIDIAN: 5
  '2': # Ледяной
    chance: 5
    clean-up-meteorite-blocks-interval: 0
    meteorite-speed: 2
    outer-layer-size: 5
    enable-inner-layer: true
    inner-layer-size: 3
    chat-message: '&9[&6CustomMeteorites&9] &7Был замечен &b&lЛедяной &9&lМетеорит &7около &3X:&f%x% &3Z:&f%z% &7!'
    meteorite-spawn-commands:
      - ''
    core-block:
      DIAMOND_BLOCK: 1
      EMERALD_BLOCK: 1
    inner-layer-blocks:
      DIAMOND_ORE: 5
      TUBE_CORAL_BLOCK: 5
      BLUE_ICE: 10
    outer-layer-blocks:
      BLUE_ICE: 10
      PACKED_ICE: 15
      CYAN_GLAZED_TERRACOTTA: 5
      LIGHT_BLUE_GLAZED_TERRACOTTA: 5
      BLUE_GLAZED_TERRACOTTA: 2
      BLUE_STAINED_GLASS: 10
      OBSIDIAN: 10

# --- Настройки ядра ---
core-settings:
  can-hurt-entities: true
  drop-item-when-destroyed: false
  enable-explosion: true
  explosion-power: 6
  explosion-breaks-blocks: true
  explosion-sets-fire: true
  enable-lighting-strike: true
  message: '&9[&6CustomMeteorites&9] &7Метеорит упал!'
  commands:
    - ''

# --- Настройки внутреннего слоя ---
inner-layer-settings:
  can-hurt-entities: true
  drop-item-when-destroyed: false
  enable-explosion: true
  explosion-breaks-blocks: false
  explosion-power: 1
  explosion-sets-fire: true
  enable-lighting-strike: false

# --- Настройки внешнего слоя ---
outer-layer-settings:
  can-hurt-entities: true
  drop-item-when-destroyed: false
  enable-explosion: true
  explosion-breaks-blocks: false
  explosion-power: 1
  explosion-sets-fire: true
  enable-lighting-strike: false

# --- Настройки частиц ---
enable-meteorite-particles: true
# Интервал появления частиц (1–10). Меньше = больше частиц.
meteorite-particle-interval: 5
possible-meteorite-particle-effects:
  '1':
    enabled: true
    chance: 30
    particle-effect: CAMPFIRE_COSY_SMOKE
    amount: 1
    spread: 0.1
    speed: 0.05
    force-visibility: true
  '2':
